# Render.com Blueprint
# Deploy with: Connect GitHub repo to Render, it auto-detects this file

services:
  # Node.js Backend (Position Manager)
  - type: web
    name: yieldsense-backend
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: whirlpool-dashboard/server
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: RPC_URL
        sync: false  # Set manually in Render dashboard (secret)
    healthCheckPath: /health

  # Trading API (Jupiter Swap)
  - type: web
    name: yieldsense-trading-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: whirlpool-dashboard/trading-api
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: RPC_URL
        sync: false

  # Frontend (Static Site)  
  - type: web
    name: yieldsense-frontend
    runtime: static
    branch: main
    rootDir: whirlpool-dashboard
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ML API (FastAPI)
  - type: web
    name: yieldsense-ml-api
    env: python
    region: oregon
    plan: free
    branch: main
    rootDir: whirlpool-dashboard/ml-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12

  # Monitoring Service
  - type: worker
    name: yieldsense-monitoring
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: monitoring
    buildCommand: npm install --legacy-peer-deps
    startCommand: npx tsx index.ts
    envVars:
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
